name: CI

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - master
      - 'codex/**'
  pull_request:
    branches:
      - master

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build Components
        run: pnpm build

      - name: Check Generated Output
        run: pnpm check:generated

      - name: Build Docs
        run: pnpm docs:build

      - name: Verify Release Tarballs
        run: pnpm release:pack

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: End-to-End Tests
        run: pnpm test:e2e

      - name: Check Whitespace
        run: git diff --check
