name: CI

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - master
      - 'codex/**'
  pull_request:
    branches:
      - master

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Check Build Determinism and Generated Output
        id: build_generated
        run: pnpm check:build-determinism

      - name: Capture Build Diagnostics
        if: ${{ failure() && steps.build_generated.outcome == 'failure' }}
        run: |
          mkdir -p test-results
          git diff -- packages/components/es packages/components/lib packages/dnd/es packages/dnd/lib packages/ai/es packages/ai/lib > test-results/generated-tracked.diff
          git ls-files --others -- packages/components/es packages/components/lib packages/dnd/es packages/dnd/lib packages/ai/es packages/ai/lib > test-results/generated-untracked.txt

      - name: Upload Build Diagnostics
        if: ${{ failure() && steps.build_generated.outcome == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: build-generated-diagnostics
          path: test-results/
          if-no-files-found: error

      - name: Build Docs
        run: pnpm docs:build

      - name: Verify Release Tarballs
        run: pnpm release:pack

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: End-to-End Tests
        id: e2e
        run: pnpm test:e2e

      - name: Upload End-to-End Failure Artifacts
        if: ${{ failure() && steps.e2e.outcome == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results-${{ github.run_id }}-${{ github.run_attempt }}
          path: test-results/
          if-no-files-found: warn

      - name: Check Whitespace
        run: git diff --check
